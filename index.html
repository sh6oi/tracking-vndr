<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تتبع شحنتك – ألوان سمائية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تقليل العرض الأقصى */
        .track-container {
            max-width: 450px;
            width: 100%;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 36px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* هيدر بتدرج سماوي */
        .card-header {
            background: linear-gradient(135deg, #0c4a6e 0%, #0284c7 100%);
            padding: 16px 18px;
            text-align: center;
        }

        .card-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f0f9ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .card-header p {
            font-size: 0.7rem;
            color: #cffafe;
            margin-top: 4px;
        }

        .search-area {
            padding: 18px 18px 10px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 2;
            padding: 10px 14px;
            border: 1.5px solid #cbd5e1;
            border-radius: 50px;
            font-size: 0.8rem;
            text-align: center;
            outline: none;
            background: white;
            color: #0c4a6e;
        }

        .input-group input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56,189,248,0.2);
        }

        .example-hint {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 8px;
            color: #0284c7;
            font-weight: 600;
        }

        .input-group button {
            background: #0284c7;
            border: none;
            padding: 0 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-group button:hover {
            background: #0369a1;
            transform: scale(0.97);
        }

        .status-stepper {
            padding: 14px 18px 20px;
        }

        .stepper-title {
            font-size: 0.65rem;
            font-weight: 700;
            color: #0369a1;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }

        .vertical-steps {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .step-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 22px;
            padding: 10px 14px;
            transition: all 0.2s ease;
        }

        .step-icon {
            width: 38px;
            height: 38px;
            background: #eef2ff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #0369a1;
        }

        .step-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #334155;
            flex: 1;
        }

        /* المرحلة النشطة بلون سماوي */
        .step-card.active {
            background: #e0f2fe;
            border-color: #38bdf8;
            box-shadow: 0 2px 6px rgba(56,189,248,0.1);
        }

        .step-card.active .step-icon {
            background: #0ea5e9;
            color: white;
        }

        .step-card.active .step-label {
            color: #0369a1;
            font-weight: 800;
        }

        .step-card.inactive {
            background: #ffffff;
            border-color: #e2e8f0;
        }

        .step-card.inactive .step-icon {
            background: #f1f5f9;
            color: #94a3b8;
        }

        .step-card.inactive .step-label {
            color: #64748b;
        }

        .error-message {
            color: #b91c1c;
            background: #fff0f0;
            border-radius: 28px;
            padding: 10px;
            font-size: 0.75rem;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 12px;
            font-size: 0.6rem;
            background: #ecfdf5;
            color: #0e7faf;
        }

        @media (max-width: 480px) {
            .step-icon {
                width: 32px;
                height: 32px;
                font-size: 1rem;
                border-radius: 14px;
            }
            .step-label {
                font-size: 0.7rem;
            }
            .step-card {
                padding: 8px 12px;
                gap: 10px;
            }
            .card-header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="track-container">
    <div class="card">
        <div class="card-header">
            <h1>📦 تتبع شحنتك</h1>
        </div>
        <div class="search-area">
            <div class="input-group">
                <input type="text" id="trackingNumber" placeholder="مثال: 0001" autocomplete="off">
                <button id="trackBtn">🔍 تتبع</button>
            </div>
            <div class="example-hint">📋 0001 : مثال</div>
        </div>

        <div id="resultDynamic" style="display: none;">
            <div class="status-stepper">
                <div class="stepper-title">🚚 مراحل الشحن</div>
                <div class="vertical-steps" id="stepsContainer"></div>
            </div>
        </div>
        <div id="errorArea" style="display: none; padding: 0 18px 18px;">
            <div class="error-message" id="errorMsg">⚠️ الطلب غير موجود</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDXY2aKmzbKqxs2EmMiMAZ-_5qatDLiXZQ",
        authDomain: "alipay-5f8b3.firebaseapp.com",
        databaseURL: "https://alipay-5f8b3-default-rtdb.firebaseio.com",
        projectId: "alipay-5f8b3",
        storageBucket: "alipay-5f8b3.firebasestorage.app",
        messagingSenderId: "89272268",
        appId: "1:89272268:web:6f4c4fca444f2898cc7769",
        measurementId: "G-YHXXK6ZKXC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ALL_STATUSES = [
        "جاري المعالجة",
        "جاري التجهيز",
        "قيد الشحن الى الامارات",
        "قيد الشحن الى العراق",
        "تم الاستلام في البصرة",
        "جاري الشحن لمخازننا في الناصرية",
        "وصلت شحنتك بنجاح"
    ];

    const STATUS_ICONS = {
        "جاري المعالجة": "⚙️",
        "جاري التجهيز": "📦",
        "قيد الشحن الى الامارات": "✈️",
        "قيد الشحن الى العراق": "🚛",
        "تم الاستلام في البصرة": "✅",
        "جاري الشحن لمخازننا في الناصرية": "🏭",
        "وصلت شحنتك بنجاح": "🎉"
    };

    const trackInput = document.getElementById('trackingNumber');
    const trackBtn = document.getElementById('trackBtn');
    const resultDiv = document.getElementById('resultDynamic');
    const errorDiv = document.getElementById('errorArea');
    const stepsContainer = document.getElementById('stepsContainer');

    function renderAllStages(currentStatus) {
        stepsContainer.innerHTML = '';
        ALL_STATUSES.forEach(status => {
            const isActive = (status === currentStatus);
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step-card';
            stepDiv.classList.add(isActive ? 'active' : 'inactive');
            stepDiv.innerHTML = `
                <div class="step-icon">${STATUS_ICONS[status] || '📌'}</div>
                <div class="step-label">${status}</div>
            `;
            stepsContainer.appendChild(stepDiv);
        });
    }

    async function trackOrder() {
        let orderId = trackInput.value.trim();
        if (!orderId) {
            alert("الرجاء إدخال رقم التتبع");
            return;
        }
        resultDiv.style.display = 'none';
        errorDiv.style.display = 'none';
        resultDiv.style.display = 'block';
        stepsContainer.innerHTML = '<div class="step-card">جاري البحث...</div>';

        try {
            const snapshot = await get(ref(db, `orders/${orderId}`));
            if (snapshot.exists()) {
                const currentStatus = snapshot.val().status || "جاري المعالجة";
                renderAllStages(currentStatus);
                errorDiv.style.display = 'none';
            } else {
                resultDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                document.getElementById('errorMsg').innerHTML = `❌ لا يوجد طلب برقم "${orderId}"`;
            }
        } catch (err) {
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'block';
            document.getElementById('errorMsg').innerHTML = `⚠️ خطأ في الاتصال: ${err.message}`;
        }
    }

    trackBtn.addEventListener('click', trackOrder);
    trackInput.addEventListener('keypress', (e) => e.key === 'Enter' && trackOrder());
</script>
</body>
</html>
