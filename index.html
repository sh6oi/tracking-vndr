<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تتبع شحنتك – نسخة مبسطة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f5 0%, #dce5ec 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .track-container {
            max-width: 550px;
            width: 100%;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .card-header {
            background: #0b2b3b;
            padding: 18px 20px;
            text-align: center;
        }

        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .card-header p {
            font-size: 0.75rem;
            color: #cbdbe0;
            margin-top: 4px;
        }

        .search-area {
            padding: 20px 20px 12px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 2;
            padding: 12px 16px;
            border: 1.5px solid #e2edf7;
            border-radius: 50px;
            font-size: 0.85rem;
            text-align: center;
            outline: none;
            background: white;
            color: #1f2f3e;
        }

        .input-group input:focus {
            border-color: #0f6b8c;
        }

        .input-group button {
            background: #0f6b8c;
            border: none;
            padding: 0 24px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        /* شريط الحالات بدون أي خط */
        .status-stepper {
            padding: 16px 20px 24px;
        }

        .stepper-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: #5f7f9e;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .step {
            flex: 1;
            text-align: center;
            min-width: 55px;
            background: transparent;
        }

        .step-icon {
            width: 36px;
            height: 36px;
            background: #f0f4f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            font-size: 1.1rem;
            border: 1px solid #cddfea;
            transition: all 0.2s;
            color: #3e5a6b;
        }

        .step-label {
            font-size: 0.55rem;
            font-weight: 600;
            color: #6c7e91;
            line-height: 1.2;
            max-width: 70px;
            margin: 0 auto;
        }

        /* الحالة النشطة (بدون أخضر) */
        .step.active .step-icon {
            background: #0f6b8c;
            border-color: #0f6b8c;
            color: white;
            box-shadow: 0 4px 8px rgba(15,107,140,0.2);
        }

        .step.active .step-label {
            color: #0f6b8c;
            font-weight: 800;
        }

        /* الحالة المكتملة - لون رمادي محايد */
        .step.completed .step-icon {
            background: #e9ecef;
            border-color: #bdc4cc;
            color: #4b5c6e;
        }
        .step.completed .step-label {
            color: #7c8ea0;
        }

        /* بطاقة الحالة الرئيسية */
        .main-status-card {
            background: #f8fafd;
            border-radius: 32px;
            margin: 8px 20px 0;
            padding: 14px 12px;
            text-align: center;
            border-right: 4px solid #0f6b8c;
        }

        .status-badge-large {
            font-size: 1.3rem;
            font-weight: 800;
            color: #0b2b3b;
            margin-bottom: 6px;
        }

        .order-id {
            background: #eef2fa;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1f6390;
        }

        .error-message {
            color: #b91c1c;
            background: #fff0f0;
            border-radius: 30px;
            padding: 12px;
            font-size: 0.8rem;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 14px;
            font-size: 0.65rem;
            background: #f1f5f9;
            color: #5f7f9e;
        }

        @media (max-width: 480px) {
            .step-label {
                font-size: 0.5rem;
                max-width: 55px;
            }
            .step-icon {
                width: 30px;
                height: 30px;
                font-size: 0.9rem;
            }
            .status-badge-large {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="track-container">
    <div class="card">
        <div class="card-header">
            <h1>📦 تتبع شحنتك</h1>
            <p>أدخل رقم التتبع لمعرفة التفاصيل</p>
        </div>
        <div class="search-area">
            <div class="input-group">
                <input type="text" id="trackingNumber" placeholder="مثال: ORD-1001" autocomplete="off">
                <button id="trackBtn">🔍 تتبع</button>
            </div>
        </div>

        <div id="resultDynamic" style="display: none;">
            <div class="main-status-card">
                <div class="status-badge-large" id="statusTextLarge">---</div>
                <div class="order-id" id="orderIdDisplay"></div>
            </div>
            <div class="status-stepper">
                <div class="stepper-title">⛵ مراحل الشحنة</div>
                <div class="steps" id="stepsContainer"></div>
            </div>
        </div>
        <div id="errorArea" style="display: none; padding: 0 20px 20px;">
            <div class="error-message" id="errorMsg">⚠️ الطلب غير موجود</div>
        </div>
        <footer>جميع الحالات محدثة فورياً</footer>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDXY2aKmzbKqxs2EmMiMAZ-_5qatDLiXZQ",
        authDomain: "alipay-5f8b3.firebaseapp.com",
        databaseURL: "https://alipay-5f8b3-default-rtdb.firebaseio.com",
        projectId: "alipay-5f8b3",
        storageBucket: "alipay-5f8b3.firebasestorage.app",
        messagingSenderId: "89272268",
        appId: "1:89272268:web:6f4c4fca444f2898cc7769",
        measurementId: "G-YHXXK6ZKXC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const STATUS_FLOW = [
        "جاري المعالجة",
        "جاري التجهيز",
        "قيد الشحن الى الامارات",
        "قيد الشحن الى العراق",
        "تم الاستلام في البصرة",
        "جاري الشحن لمخازننا في الناصرية",
        "وصلت شحنتك بنجاح"
    ];

    const STATUS_ICONS = {
        "جاري المعالجة": "⚙️",
        "جاري التجهيز": "📦",
        "قيد الشحن الى الامارات": "✈️",
        "قيد الشحن الى العراق": "🚛",
        "تم الاستلام في البصرة": "✅",
        "جاري الشحن لمخازننا في الناصرية": "🏭",
        "وصلت شحنتك بنجاح": "🎉"
    };

    const trackInput = document.getElementById('trackingNumber');
    const trackBtn = document.getElementById('trackBtn');
    const resultDiv = document.getElementById('resultDynamic');
    const errorDiv = document.getElementById('errorArea');
    const statusTextLarge = document.getElementById('statusTextLarge');
    const orderIdDisplaySpan = document.getElementById('orderIdDisplay');
    const stepsContainer = document.getElementById('stepsContainer');

    function buildStepper() {
        stepsContainer.innerHTML = '';
        STATUS_FLOW.forEach((status) => {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step';
            stepDiv.setAttribute('data-status', status);
            stepDiv.innerHTML = `
                <div class="step-icon">${STATUS_ICONS[status] || '📌'}</div>
                <div class="step-label">${status}</div>
            `;
            stepsContainer.appendChild(stepDiv);
        });
    }

    function updateStepper(currentStatus) {
        const steps = document.querySelectorAll('.step');
        let activeIndex = -1;
        for (let i = 0; i < STATUS_FLOW.length; i++) {
            if (STATUS_FLOW[i] === currentStatus) {
                activeIndex = i;
                break;
            }
        }
        steps.forEach(step => step.classList.remove('active', 'completed'));
        if (activeIndex !== -1) {
            steps[activeIndex].classList.add('active');
            for (let i = 0; i < activeIndex; i++) {
                steps[i].classList.add('completed');
            }
        }
    }

    async function trackOrder() {
        let orderId = trackInput.value.trim();
        if (!orderId) {
            alert("الرجاء إدخال رقم التتبع");
            return;
        }
        resultDiv.style.display = 'none';
        errorDiv.style.display = 'none';
        resultDiv.style.display = 'block';
        statusTextLarge.textContent = "🔍 جاري البحث...";
        try {
            const snapshot = await get(ref(db, `orders/${orderId}`));
            if (snapshot.exists()) {
                const currentStatus = snapshot.val().status || "جاري المعالجة";
                statusTextLarge.textContent = `${STATUS_ICONS[currentStatus] || '📋'}  ${currentStatus}`;
                orderIdDisplaySpan.textContent = `رقم الطلب: ${orderId}`;
                updateStepper(currentStatus);
                errorDiv.style.display = 'none';
            } else {
                resultDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                document.getElementById('errorMsg').innerHTML = `❌ لا يوجد طلب برقم "${orderId}"`;
            }
        } catch (err) {
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'block';
            document.getElementById('errorMsg').innerHTML = `⚠️ خطأ في الاتصال: ${err.message}`;
        }
    }

    trackBtn.addEventListener('click', trackOrder);
    trackInput.addEventListener('keypress', (e) => e.key === 'Enter' && trackOrder());
    buildStepper();
</script>
</body>
</html>
