<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تتبع الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            right: -1.75rem;
            top: 0;
            width: 1px;
            height: 100%;
            background-color: #e2e8f0;
        }
        
        .timeline-dot {
            position: absolute;
            right: -2.25rem;
            top: 0.25rem;
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 0 3px #6c5ce7;
        }
        
        .timeline-item.active .timeline-dot {
            background-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.5);
            animation: pulse 2s infinite;
        }
        
        .timeline-item.completed .timeline-dot {
            background-color: #00b894;
            box-shadow: 0 0 0 3px rgba(0, 184, 148, 0.3);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(108, 92, 231, 0); }
            100% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0); }
        }
        
        .status-badge {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }
        
        .search-input:focus {
            box-shadow: 0 0 0 2px #6c5ce7;
        }
        
        .card-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        .spinner {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Header -->
    <header class="gradient-bg text-white py-6 px-4 shadow-lg">
        <div class="container mx-auto">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold flex items-center">
                        <i class="fas fa-box-open ml-2"></i>
                        نظام تتبع الطلبات
                    </h1>
                    <p class="text-sm md:text-base mt-1 opacity-90">تابع حالة طلبك خطوة بخطوة</p>
                </div>
                <div class="hidden md:block">
                    <img src="https://cdn-icons-png.flaticon.com/512/3710/3710304.png" alt="Delivery" class="h-16">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <div class="max-w-3xl mx-auto">
            <!-- Search Card -->
            <div class="bg-white rounded-xl p-6 mb-8 card-shadow">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fas fa-search ml-2 text-purple-600"></i>
                    ابحث عن طلبك
                </h2>
                
                <div id="errorAlert" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 flex items-center">
                    <i class="fas fa-exclamation-circle ml-2"></i>
                    <span id="errorText">رقم الطلب غير صحيح أو غير موجود</span>
                </div>
                
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1 relative">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                            <i class="fas fa-hashtag"></i>
                        </div>
                        <input type="text" id="orderNumber" 
                               class="w-full pr-10 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 search-input" 
                               placeholder="أدخل رقم الطلب هنا...">
                    </div>
                    <button id="trackBtn" 
                            class="gradient-bg hover:opacity-90 text-white font-medium py-3 px-6 rounded-lg transition-all duration-300 flex items-center justify-center">
                        <i class="fas fa-search ml-2"></i>
                        تتبع الطلب
                    </button>
                </div>
            </div>
            
            <!-- Loading Indicator -->
            <div id="loading" class="hidden text-center py-12">
                <div class="inline-block border-4 border-purple-500 border-t-transparent rounded-full w-12 h-12 spinner mb-4"></div>
                <p class="text-gray-600 font-medium">جاري البحث عن طلبك...</p>
            </div>
            
            <!-- Order Status Card -->
            <div id="orderStatus" class="hidden bg-white rounded-xl p-6 card-shadow">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 p-4 bg-gray-50 rounded-lg">
                    <div class="mb-3 md:mb-0">
                        <h3 class="text-sm text-gray-500">رقم الطلب</h3>
                        <p id="displayOrderNumber" class="text-lg font-bold text-purple-600 flex items-center">
                            <i class="fas fa-hashtag ml-2"></i>
                            <span>123456</span>
                        </p>
                    </div>
                    <div>
                        <h3 class="text-sm text-gray-500">الحالة الحالية</h3>
                        <p id="currentStatus" class="status-badge text-white px-4 py-1 rounded-full text-sm font-medium inline-flex items-center">
                            <i class="fas fa-circle-notch animate-spin ml-2 text-xs"></i>
                            <span>جاري التجهيز</span>
                        </p>
                    </div>
                </div>
                
                <h3 class="text-lg font-bold text-gray-800 mb-6 flex items-center">
                    <i class="fas fa-map-marked-alt ml-2 text-purple-600"></i>
                    مسار الطلب
                </h3>
                
                <div class="relative">
                    <!-- Timeline -->
                    <div id="statusTimeline" class="space-y-8 pl-8">
                        <!-- Timeline items will be added here dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white py-6 border-t border-gray-200 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-600 text-sm">
                <i class="fas fa-shield-alt ml-2 text-purple-600"></i>
                نظام آمن لتتبع طلباتك © 2023 جميع الحقوق محفوظة
            </p>
        </div>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDEP35xsyNnDFNY4XEjm9ipvTBk44SKQ1Y",
            authDomain: "qq-9acb9.firebaseapp.com",
            databaseURL: "https://qq-9acb9-default-rtdb.firebaseio.com",
            projectId: "qq-9acb9",
            storageBucket: "qq-9acb9.appspot.com",
            messagingSenderId: "541616407142",
            appId: "1:541616407142:web:95d8b7773b371b05e7a3a7"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.addEventListener('DOMContentLoaded', function() {
            const trackBtn = document.getElementById('trackBtn');
            const orderNumberInput = document.getElementById('orderNumber');
            const orderStatusDiv = document.getElementById('orderStatus');
            const errorAlert = document.getElementById('errorAlert');
            const loadingDiv = document.getElementById('loading');

            trackBtn.addEventListener('click', trackOrder);
            orderNumberInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    trackOrder();
                }
            });

            function trackOrder() {
                const orderNumber = orderNumberInput.value.trim();

                if (!orderNumber) {
                    showError('الرجاء إدخال رقم الطلب');
                    return;
                }

                // Show loading
                loadingDiv.classList.remove('hidden');
                orderStatusDiv.classList.add('hidden');
                errorAlert.classList.add('hidden');

                // Check if order exists in database
                const orderRef = database.ref('orders/' + orderNumber);
                orderRef.once('value')
                    .then((snapshot) => {
                        loadingDiv.classList.add('hidden');

                        if (snapshot.exists()) {
                            const orderData = snapshot.val();
                            displayOrderStatus(orderNumber, orderData);
                        } else {
                            showError('رقم الطلب غير صحيح أو غير موجود');
                        }
                    })
                    .catch((error) => {
                        loadingDiv.classList.add('hidden');
                        showError('حدث خطأ أثناء جلب بيانات الطلب');
                        console.error('Error fetching order:', error);
                    });
            }

            function displayOrderStatus(orderNumber, orderData) {
                document.getElementById('displayOrderNumber').querySelector('span').textContent = orderNumber;
                document.getElementById('currentStatus').querySelector('span').textContent = orderData.status;

                const timeline = document.getElementById('statusTimeline');
                timeline.innerHTML = '';

                // Define all possible statuses in order (with "جاري التجهيز" last)
                const allStatuses = [
                    { id: 'purchased', title: 'تم الشراء', desc: 'تم شراء المنتج بنجاح', icon: 'fa-check-circle', color: 'text-green-500' },
                    { id: 'shipped_uae', title: 'تم الشحن للإمارات', desc: 'تم شحن الطلب إلى الإمارات', icon: 'fa-plane-departure', color: 'text-blue-500' },
                    { id: 'received_uae', title: 'تم الاستلام في الإمارات', desc: 'تم استلام الطلب في مستودع الإمارات', icon: 'fa-warehouse', color: 'text-indigo-500' },
                    { id: 'shipped_iraq', title: 'تم الشحن للعراق', desc: 'تم شحن الطلب إلى العراق', icon: 'fa-truck', color: 'text-purple-500' },
                    { id: 'preparing', title: 'جاري التجهيز', desc: 'سوف يصل طلبك خلال 24 ساعة', icon: 'fa-cog', color: 'text-yellow-500' }
                ];

                // Find the current status index
                let currentStatusIndex = -1;
                for (let i = 0; i < allStatuses.length; i++) {
                    if (allStatuses[i].title === orderData.status) {
                        currentStatusIndex = i;
                        break;
                    }
                }

                // Create timeline steps
                allStatuses.forEach((status, index) => {
                    const stepDiv = document.createElement('div');
                    stepDiv.className = 'timeline-item relative';

                    if (index < currentStatusIndex) {
                        stepDiv.classList.add('completed');
                    } else if (index === currentStatusIndex) {
                        stepDiv.classList.add('active');
                    }

                    const dotDiv = document.createElement('div');
                    dotDiv.className = 'timeline-dot';
                    stepDiv.appendChild(dotDiv);

                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'bg-gray-50 p-4 rounded-lg border border-gray-200';

                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'flex items-center mb-2';
                    titleDiv.innerHTML = `
                        <i class="fas ${status.icon} ${status.color} ml-2"></i>
                        <h4 class="font-bold ${index === currentStatusIndex ? 'text-purple-600' : 'text-gray-800'}">${status.title}</h4>
                    `;

                    const descDiv = document.createElement('p');
                    descDiv.className = 'text-gray-600 text-sm mb-1';
                    descDiv.textContent = status.desc;

                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'text-xs text-gray-500 flex items-center';
                    dateDiv.innerHTML = `
                        <i class="far fa-clock ml-2"></i>
                        ${orderData.timestamp ? new Date(orderData.timestamp).toLocaleString('ar-SA') : 'غير معروف'}
                    `;

                    contentDiv.appendChild(titleDiv);
                    contentDiv.appendChild(descDiv);
                    contentDiv.appendChild(dateDiv);
                    stepDiv.appendChild(contentDiv);

                    timeline.appendChild(stepDiv);
                });

                orderStatusDiv.classList.remove('hidden');
            }

            function showError(message) {
                document.getElementById('errorText').textContent = message;
                errorAlert.classList.remove('hidden');
                orderStatusDiv.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
