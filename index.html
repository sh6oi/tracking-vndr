<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تتبع شحنتك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .tracking-card {
            background: white;
            max-width: 550px;
            width: 100%;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 5px 12px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .header {
            background: #1e3c72;
            color: white;
            padding: 30px 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header p {
            opacity: 0.85;
            margin-top: 8px;
            font-size: 1rem;
        }

        .content {
            padding: 32px 24px 40px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 44px;
            font-size: 1rem;
            background: #fff;
            transition: 0.2s;
            outline: none;
            text-align: center;
            font-weight: 500;
        }

        .search-box input:focus {
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30,60,114,0.2);
        }

        .search-box button {
            background: #1e3c72;
            border: none;
            padding: 0 28px;
            border-radius: 44px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box button:hover {
            background: #0f2b4f;
            transform: scale(0.96);
        }

        .result {
            background: #f8fafc;
            border-radius: 32px;
            padding: 24px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid #eef2f8;
        }

        .result .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5b6e8c;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .result .status {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #2b4f8c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            word-break: break-word;
            line-height: 1.3;
        }

        .not-found {
            color: #c2410c;
            background: #fff2ed;
            border-right: 5px solid #c2410c;
        }

        .order-id {
            margin-top: 16px;
            font-size: 0.8rem;
            color: #6c7a91;
            background: #eef2ff;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            padding: 20px 24px;
            background: #f1f5f9;
            color: #5b6e8c;
        }

        @media (max-width: 500px) {
            .search-box button {
                width: 100%;
                justify-content: center;
                padding: 16px;
            }
            .result .status {
                font-size: 1.4rem;
            }
            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="tracking-card">
    <div class="header">
        <h1>📦 تتبع شحنتك</h1>
        <p>أدخل رقم التتبع لمعرفة الحالة</p>
    </div>
    <div class="content">
        <div class="search-box">
            <input type="text" id="trackingNumber" placeholder="مثال: ORD-1001" autocomplete="off">
            <button id="trackBtn">🔍 تتبع</button>
        </div>
        <div id="resultArea" class="result" style="display: none;">
            <div class="label">حالة الطلب الحالية</div>
            <div class="status" id="statusText">---</div>
            <div class="order-id" id="orderIdDisplay"></div>
        </div>
    </div>
    <footer>جميع الحالات محدثة بشكل فوري من نظام الإدارة</footer>
</div>

<script type="module">
    // Firebase Configuration (مقدم منك)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDXY2aKmzbKqxs2EmMiMAZ-_5qatDLiXZQ",
        authDomain: "alipay-5f8b3.firebaseapp.com",
        databaseURL: "https://alipay-5f8b3-default-rtdb.firebaseio.com",
        projectId: "alipay-5f8b3",
        storageBucket: "alipay-5f8b3.firebasestorage.app",
        messagingSenderId: "89272268",
        appId: "1:89272268:web:6f4c4fca444f2898cc7769",
        measurementId: "G-YHXXK6ZKXC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const trackInput = document.getElementById('trackingNumber');
    const trackBtn = document.getElementById('trackBtn');
    const resultArea = document.getElementById('resultArea');
    const statusText = document.getElementById('statusText');
    const orderIdDisplay = document.getElementById('orderIdDisplay');

    async function trackOrder() {
        let orderId = trackInput.value.trim();
        if (!orderId) {
            alert("الرجاء إدخال رقم التتبع");
            return;
        }

        // عرض حالة التحميل
        resultArea.style.display = "block";
        statusText.textContent = "جاري البحث ...";
        statusText.style.color = "#5b6e8c";
        resultArea.classList.remove("not-found");
        orderIdDisplay.textContent = "";

        try {
            const orderRef = ref(db, `orders/${orderId}`);
            const snapshot = await get(orderRef);

            if (snapshot.exists()) {
                const orderData = snapshot.val();
                const currentStatus = orderData.status || "لا توجد حالة محددة";
                statusText.textContent = currentStatus;
                statusText.style.color = "#1e3c72";
                orderIdDisplay.textContent = `رقم الطلب: ${orderId}`;
                resultArea.classList.remove("not-found");
            } else {
                // لم يتم العثور على الطلب
                statusText.textContent = "❌ لا يوجد طلب بهذا الرقم";
                statusText.style.color = "#c2410c";
                orderIdDisplay.textContent = "تأكد من الرقم وأعد المحاولة";
                resultArea.classList.add("not-found");
            }
        } catch (error) {
            console.error("خطأ في جلب البيانات:", error);
            statusText.textContent = "⚠️ خطأ في الاتصال بقاعدة البيانات";
            statusText.style.color = "#c2410c";
            orderIdDisplay.textContent = "حاول لاحقاً";
            resultArea.classList.add("not-found");
        }
    }

    trackBtn.addEventListener('click', trackOrder);
    trackInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') trackOrder();
    });
</script>
</body>
</html>
